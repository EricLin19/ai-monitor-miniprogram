name: Update AI monitor cache

on:
  workflow_dispatch:
  schedule:
    - cron: "15 23 * * *"

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update cache
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: node scripts/update-cache.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniprogram/data/mockMetrics.js cloudfunctions/fetchMetrics/mockMetrics.js miniprogram/data/cacheMeta.js
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "Update AI monitor cache"
            git push
          fi
